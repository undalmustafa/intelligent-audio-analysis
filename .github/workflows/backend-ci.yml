name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/AudioBackend.csproj

      - name: Build
        run: dotnet build backend/AudioBackend.csproj --no-restore --configuration Release

      - name: Check for warnings
        run: dotnet build backend/AudioBackend.csproj --no-restore --configuration Release -warnaserror 2>&1 || true
